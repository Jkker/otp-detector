[tools]
android-sdk = "1.0"
java = "21.0.2"
gradle = "8.14.4"
kotlin = "2.1.21"

[env]
ANDROID_HOME = "{{env.HOME}}/android-sdk"
ANDROID_SIGNING_ITEM = "ANDROID_APP_SIGNING"

[tasks.dev]
description = "Build debug APK without release signing credentials"
run = "./gradlew assembleDebug"

[tasks.build]
description = "Build signed release APK from rbw Android signing item"
run = "bash ./scripts/android-release-build.sh"

[tasks.setup-github-action-secrets]
description = "Copy Android signing secrets from rbw to GitHub Actions secrets"
run = "bash ./scripts/setup-github-secrets.sh"

[tasks.test]
description = "Run all unit tests"
run = "./gradlew test"

[tasks.lint]
description = "Run lint checks"
run = "./gradlew lintDebug"

[tasks.clean]
description = "Clean the build directory"
run = "./gradlew clean"

[tasks.release]
description = "Tag version for release (triggers CI)"
run = "git tag v$(grep 'versionName =' app/build.gradle.kts | cut -d'\"' -f2) && git push origin --tags"
